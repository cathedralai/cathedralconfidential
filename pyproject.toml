[project]
name = "cathedral"
version = "0.0.0"
description = "Confidential compute subnet (SN39): attestation is admission, verified work is currency"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  # bittensor SDK added in Phase 1 when chain integration lands
  # "bittensor>=8.0",
]

[project.optional-dependencies]
# stdlib-only runtime; the only third-party dependency anywhere is pytest (dev).
dev = ["pytest>=8.0"]

[project.scripts]
cathedral = "cathedral.cli:main"
cathedral-census = "cathedral.census:main"
cathedral-enroll = "cathedral.enroll:main"
cathedral-validator = "cathedral.neuron.validator:main"
cathedral-miner = "cathedral.neuron.miner:main"
cathedral-prober = "cathedral.prober:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py311"
